name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check licenses bans sources

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - run: cargo install cargo-audit --locked --version 0.22.1
      - run: cargo audit

  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - run: cargo install cargo-machete --locked --version 0.8.0
      - run: cargo machete

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo +nightly miri test -p sc-core -p sc-wav -p sonare-codec --features wav

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - run: cargo run -p xtask -- fuzz-smoke
      - run: >
          cargo check --manifest-path fuzz/Cargo.toml
          --bin wav_decode
          --bin flac_decode
          --bin aac_decode
          --bin vorbis_decode
          --bin opus_decode
          --bin m4a_demux
          --bin mp3_header

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: taiki-e/install-action@wasm-pack
      - run: wasm-pack build bindings/wasm --target bundler

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install "maturin>=1.8,<2"
      - run: python -m maturin build
        working-directory: bindings/python

  package-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@wasm-pack
      - run: cargo install cargo-audit --locked --version 0.22.1
      - run: cargo install cargo-machete --locked --version 0.8.0
      - run: cargo install cargo-semver-checks --locked --version 0.42.0
      - run: python -m pip install "maturin>=1.8,<2"
      - run: cargo run -p xtask -- package-preflight
        env:
          SONARE_REQUIRED_QA_TOOLS: nextest,audit,machete,semver-checks

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo run -p xtask -- release-check
